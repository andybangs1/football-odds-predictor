services:
  - type: web
    name: football-odds-predictor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_DEBUG
        value: False
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.5
